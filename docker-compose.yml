# Base stack — NO published ports (secure by default; nothing inbound).
#   Local dev:  `docker compose up`   (auto-merges docker-compose.override.yml → host ports for db + app)
#   Production: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`
#               (adds migrate-on-deploy, the cloudflared tunnel that fronts the app, and a nightly backup)
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: token_system
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d token_system"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/token_system
      # SESSION_SECRET is required in production; substituted from the VM's .env,
      # with a ≥16-char dev fallback so a local `docker compose up` still boots.
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-secret-change-me}
      NODE_ENV: production
      TZ: Asia/Kolkata
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
